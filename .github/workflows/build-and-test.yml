name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore HelixExplorer.sln

      - name: Build
        run: dotnet build HelixExplorer.sln --no-restore -c Release

      - name: Run tests
        run: dotnet test HelixExplorer.sln --no-build -c Release --verbosity normal
