name: Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Directory.Build.props
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.SelectSingleNode('/Project/PropertyGroup/Version')?.InnerText
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Directory.Build.props must define Project/PropertyGroup/Version."
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          if (git tag -l $tag) {
            Write-Host "Tag $tag already exists, skipping release."
            "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        if: steps.check.outputs.skip != 'true'
        run: dotnet restore HelixExplorer.sln

      - name: Publish application
        if: steps.check.outputs.skip != 'true'
        run: >-
          dotnet publish src/HelixExplorer/HelixExplorer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:DebugType=none
          -p:DebugSymbols=false
          -o publish/win-x64

      - name: Setup PolyInstall
        if: steps.check.outputs.skip != 'true'
        uses: bolorundurowb/PolyInstall/.github/actions/setup-polyinstall@v2.0.1
        with:
          version: v2.1.1
          rid: win-x64

      - name: Validate manifest
        if: steps.check.outputs.skip != 'true'
        env:
          HELIX_VERSION: ${{ steps.version.outputs.version }}
          POLYINSTALL_TARGET: windows-x64
        run: polyinstall validate installer/helix-explorer.install.yaml --base .

      - name: Build installer
        if: steps.check.outputs.skip != 'true'
        env:
          HELIX_VERSION: ${{ steps.version.outputs.version }}
          POLYINSTALL_TARGET: windows-x64
        run: polyinstall build installer/helix-explorer.install.yaml --base .

      - name: Verify installer artifacts
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path dist -File -Recurse -ErrorAction SilentlyContinue
          if (-not $artifacts) {
            throw "PolyInstall did not produce any files in dist."
          }
          $artifacts | ForEach-Object { Write-Host "Installer artifact: $($_.FullName)" }

      - name: Create release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/**
          fail_on_unmatched_files: true
          generate_release_notes: true
