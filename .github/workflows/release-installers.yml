name: Build and Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        default: "0.1.0"
      target:
        description: "Build target"
        required: true
        type: choice
        options:
          - windows-x64
        default: "windows-x64"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
            target: windows-x64
            artifact: helix-explorer-installer-win-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore HelixExplorer.sln

      - name: Publish application
        run: >
          dotnet publish src/HelixExplorer/HelixExplorer.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish/${{ matrix.rid }}

      - name: Setup PolyInstall
        uses: bolorundurowb/PolyInstall/.github/actions/setup-polyinstall@v1.0.0
        with:
          version: v1.0.0
          rid: ${{ matrix.rid }}

      - name: Validate manifest
        env:
          HELIX_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          POLYINSTALL_TARGET: ${{ matrix.target }}
        run: polyinstall validate installer/helix-explorer.install.yaml --base .

      - name: Build installer
        env:
          HELIX_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          POLYINSTALL_TARGET: ${{ matrix.target }}
        run: polyinstall build installer/helix-explorer.install.yaml --base .

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: installer/dist/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-pre') || contains(github.ref_name, '-rc') }}
