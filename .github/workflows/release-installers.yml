name: Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Directory.Build.props
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          if (git tag -l $tag) {
            Write-Host "Tag $tag already exists, skipping release."
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        if: steps.check.outputs.skip != 'true'
        run: dotnet restore HelixExplorer.sln

      - name: Publish application
        if: steps.check.outputs.skip != 'true'
        run: dotnet publish src/HelixExplorer/HelixExplorer.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64

      - name: Setup PolyInstall
        if: steps.check.outputs.skip != 'true'
        uses: bolorundurowb/PolyInstall/.github/actions/setup-polyinstall@v2.0.0
        with:
          version: v1.0.0
          rid: win-x64

      - name: Validate manifest
        if: steps.check.outputs.skip != 'true'
        env:
          HELIX_VERSION: ${{ steps.version.outputs.version }}
          POLYINSTALL_TARGET: windows-x64
        run: polyinstall validate installer/helix-explorer.install.yaml --base .

      - name: Build installer
        if: steps.check.outputs.skip != 'true'
        env:
          HELIX_VERSION: ${{ steps.version.outputs.version }}
          POLYINSTALL_TARGET: windows-x64
        run: polyinstall build installer/helix-explorer.install.yaml --base .

      - name: Create release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: installer/dist/**
          generate_release_notes: true
